version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lab5-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rrtu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data: